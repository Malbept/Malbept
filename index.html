<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ПОТУЖНОМЕТР</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="themes.css">
</head>
<body class="dark">
  <div id="game-container">
    <div id="main" class="screen active">
      <div class="header">
        <img src="ukraine-flag.png" alt="Ukrainian Flag" class="flag">
        <h1 data-lang="title">ПОТУЖНОМЕТР</h1>
        <span class="pm-label">VODЄM</span>
      </div>
      <div class="player-info">
        <div class="info-card" id="player-name"></div>
        <div class="info-card score-card" id="score">0P</div>
        <div class="info-card" id="energy">Енергія: 100/100</div>
        <div class="info-card" id="level">Рівень: 1</div>
      </div>
      <div class="progress-section">
        <div class="progress-bar">
          <div class="progress-fill"></div>
          <span class="progress-text">0%</span>
        </div>
      </div>
      <button id="tap-button" class="tap-button" data-lang="tap">ПТЫК</button>
      <div class="made-in" data-lang="made_in">MADE IN ВОДЄМ</div>
    </div>
    <div id="tasks" class="screen">
      <h3 data-lang="tasks">Завдання</h3>
      <div id="task-list" class="card-grid"></div>
      <div id="add-task-section">
        <h4 data-lang="add_task">Додати завдання</h4>
        <input type="text" id="new-task-description" placeholder="Опис завдання">
        <input type="number" id="new-task-target" placeholder="Мета">
        <input type="number" id="new-task-reward" placeholder="Нагорода">
        <select id="new-task-type">
          <option value="clicks">Кліки</option>
          <option value="score">Очки</option>
          <option value="upgrades">Покращення</option>
          <option value="social">Соціальні</option>
        </select>
        <input type="text" id="new-task-url" placeholder="URL (для соціальних завдань)">
        <input type="text" id="new-task-expires" placeholder="Срок действия (YYYY-MM-DD)">
        <button id="add-task-button" data-lang="add_task">Додати завдання</button>
      </div>
    </div>
    <div id="promo" class="screen">
      <h3 data-lang="promo">Промокоди</h3>
      <div class="promo-section">
        <input type="text" id="promo-code-input" placeholder="Введіть промокод">
        <button id="redeem-promo-button" data-lang="redeem_promo">Активувати</button>
      </div>
      <div id="add-promo-section">
        <h4 data-lang="add_promo">Додати промокод</h4>
        <input type="text" id="new-promo-code" placeholder="Промокод">
        <input type="number" id="new-promo-reward" placeholder="Нагорода">
        <input type="number" id="new-promo-uses" placeholder="Ліміт використань (-1 для безкінечності)">
        <input type="text" id="new-promo-expires" placeholder="Срок действия (YYYY-MM-DD)">
        <button id="add-promo-button" data-lang="add_promo">Додати промокод</button>
      </div>
    </div>
    <div id="settings" class="screen">
      <h3 data-lang="settings">Налаштування</h3>
      <div class="settings-section">
        <label for="language-select" data-lang="language">Мова:</label>
        <select id="language-select">
          <option value="uk">Українська</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <label for="theme-select" data-lang="theme">Тема:</label>
        <select id="theme-select"></select>
        <div id="custom-theme-section">
          <h4 data-lang="custom_theme">Кастомізація</h4>
          <label for="custom-theme-bg">Колір фону:</label>
          <input type="color" id="custom-theme-bg" value="#1e3a8a">
          <label for="custom-theme-button">Колір кнопок:</label>
          <input type="color" id="custom-theme-button" value="#3b82f6">
          <label for="custom-theme-text">Колір тексту:</label>
          <input type="color" id="custom-theme-text" value="#ffffff">
          <label for="custom-theme-card">Колір карточок:</label>
          <input type="color" id="custom-theme-card" value="#ffffff">
          <label for="custom-theme-progress">Колір прогрес-бару:</label>
          <input type="color" id="custom-theme-progress" value="#60a5fa">
          <label for="custom-theme-header">Колір заголовків:</label>
          <input type="color" id="custom-theme-header" value="#ffffff">
          <label for="custom-theme-shadow">Колір тіні:</label>
          <input type="color" id="custom-theme-shadow" value="#000000">
          <button id="save-custom-theme" data-lang="save_theme">Зберегти тему</button>
        </div>
      </div>
    </div>
    <div id="leaderboard" class="screen">
      <h3 data-lang="leaderboard">Лідерборд</h3>
      <h4 data-lang="leaderboard_score">Топ за монетами</h4>
      <div id="player-score-rank"></div>
      <div id="leaderboard-score-list" class="card-grid"></div>
      <h4 data-lang="leaderboard_clicks">Топ за кліками</h4>
      <div id="player-clicks-rank"></div>
      <div id="leaderboard-clicks-list" class="card-grid"></div>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="nav-button shop-button" data-lang="shop"><img src="shop-icon.png" alt="Shop"></button>
    <button class="nav-button tasks-button" data-lang="tasks"><img src="tasks-icon.png" alt="Tasks"></button>
    <button class="nav-button promo-button" data-lang="promo"><img src="promo-icon.png" alt="Promo"></button>
    <button class="nav-button main-button active" data-lang="main"><img src="main-icon.png" alt="Main"></button>
    <button class="nav-button leaderboard-button" data-lang="leaderboard"><img src="leaderboard-icon.png" alt="Leaderboard"></button>
    <button class="nav-button settings-button" data-lang="settings"><img src="settings-icon.png" alt="Settings"></button>
  </div>
  <audio id="click-sound" src="click.mp3"></audio>
  <audio id="buy-sound" src="buy.mp3"></audio>
  <script type="module" src="firebase.js"></script>
  <script type="module" src="translations.js"></script>
  <script type="module" src="game.js"></script>
  <script type="module" src="ui.js"></script>
  <script type="module" src="admin.js"></script>
  <script type="module" src="leaderboard.js"></script>
</body>
</html>
