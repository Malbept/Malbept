<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Потужно!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">Потужність</h1>

    <div class="power-meter">
      <div class="power-fill" id="powerFill"></div>
    </div>

    <button class="skull-btn" id="skullBtn">
      <img src="assets/skull.svg" alt="Череп"/>
    </button>

    <div class="power-value" id="powerValue">0</div>

    <div class="menu">
      <button onclick="showSection('store')">Магазин</button>
      <button onclick="showSection('rating')">Рейтинг</button>
      <button onclick="showSection('pvp')">PvP</button>
    </div>

    <div class="section" id="storeSection" style="display:none;">Магазин скоро</div>
    <div class="section" id="ratingSection" style="display:none;">Рейтинг скоро</div>
    <div class="section" id="pvpSection" style="display:none;">PvP скоро</div>
  </div>

  <audio id="clickSound" src="assets/click.mp3" preload="auto"></audio>
  <audio id="bgMusic" src="assets/bg.mp3" loop autoplay></audio>

  <script src="data.js"></script>
  <script src="api.js"></script>
  <script src="game.js"></script>
</body>
</html>
