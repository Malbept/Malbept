<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Потужнометр</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0f2c, #240046);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      background: rgba(30, 20, 60, 0.9);
      border: 2px solid #6a00ff;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 25px #6a00ff88, 0 0 10px #00ccff44;
      text-align: center;
      width: 340px;
    }

    .title {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #a8b6ff;
      text-shadow: 0 0 5px #6a00ff;
    }

    .bar-container {
      background: #1e1b4b;
      border-radius: 10px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 25px;
      box-shadow: inset 0 0 10px #00000088;
    }

    .bar {
      flex-grow: 1;
      margin: 0 10px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    .bar div {
      background: #6a00ff;
      width: 6px;
      height: 20px;
      border-radius: 3px;
      margin: 2px;
      box-shadow: 0 0 5px #6a00ffcc;
      transition: background 0.2s;
    }

    .output {
      font-size: 52px;
      font-weight: bold;
      margin-top: 10px;
      color: #00ccff;
      text-shadow: 0 0 10px #00ccff;
    }

    .sensitivity {
      font-size: 14px;
      margin-top: 5px;
      color: #bbb;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Потужнометр</div>
    <div class="bar-container">
      <div>😵</div>
      <div class="bar" id="bar">
        <!-- 20 полосок -->
        <div></div><div></div><div></div><div></div><div></div>
        <div></div><div></div><div></div><div></div><div></div>
        <div></div><div></div><div></div><div></div><div></div>
        <div></div><div></div><div></div><div></div><div></div>
      </div>
      <div>☠️</div>
    </div>
    <div class="output" id="output">0</div>
    <div class="sensitivity">Чутливість ×1.0</div>
    <div class="footer">Натисни гучність + для старту</div>
  </div>

  <script>
    let output = document.getElementById('output');
    let barDivs = document.querySelectorAll('.bar div');
    let value = 0;
    let max = 999;
    let active = false;

    function increasePower() {
      if (value >= max) return;
      value += Math.floor(Math.random() * 30) + 10;
      if (value > max) value = max;
      output.textContent = value;

      const barsToShow = Math.floor((value / max) * barDivs.length);
      barDivs.forEach((div, i) => {
        div.style.background = i < barsToShow ? '#00ccff' : '#6a00ff';
      });
    }

    // Поддержка клавиши Громкость +
    window.addEventListener('keydown', function(e) {
      if (e.key === 'VolumeUp') {
        e.preventDefault();
        increasePower();
      }
    });

    // Android-хак для Volume+
    window.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        window.focus();
      }
    });

    // Альтернатива: клик по экрану тоже активирует
    window.addEventListener('click', () => {
      increasePower();
    });
  </script>
</body>
</html>
